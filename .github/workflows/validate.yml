name: validate

on:
  pull_request:
    branches: [Main, main]
  push:
    branches: [Main, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Validate tenant sites (pages, sections, variants, locale parity)
        run: npm run validate:sites
      - name: Validate relocacion vertical (schema, copy, starter kits)
        run: npm run validate:vertical relocacion
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:unit
