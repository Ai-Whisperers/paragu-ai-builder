name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install dependencies
        run: |
          cd web
          npm ci
          
      - name: Run TypeScript check
        run: |
          cd web
          npm run typecheck
        id: typecheck
        
      - name: Run lint
        run: |
          cd web
          npm run lint
        id: lint
        
      - name: Run unit tests
        run: |
          cd web
          npm run test:unit
        id: unit
        continue-on-error: true
        
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: web/coverage
          retention-days: 7
          
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install dependencies
        run: |
          cd web
          npm ci
          
      - name: Install Playwright browsers
        run: |
          cd web
          npx playwright install --with-deps chromium
        
      - name: Run E2E tests
        run: |
          cd web
          npm run test:e2e
        id: e2e
        continue-on-error: true
        
      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: web/playwright-report
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install dependencies
        run: |
          cd web
          npm ci
          
      - name: Build application
        run: |
          cd web
          npm run build
        id: build
        continue-on-error: true
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: web/.next
          retention-days: 1